{% extends "templates/web.html" %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block style %}
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Outfit', sans-serif !important;
        background-color: #f9fafb !important;
        color: #1a202c;
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .bg-light-mesh {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-color: #f9fafb;
        background-image:
            radial-gradient(at 0% 0%, rgba(92, 185, 206, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.05) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(92, 185, 206, 0.05) 0px, transparent 50%),
            radial-gradient(at 0% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
    }

    .error-card {
        background: #ffffff;
        border: 1px solid rgba(0, 0, 0, 0.05);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        border-radius: 24px;
        padding: 3rem;
        max-width: 480px;
        width: 90%;
        text-align: center;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .error-code {
        font-size: 8rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #5CB9CE 0%, #4facbe 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.05em;
    }

    .btn-primary {
        background: linear-gradient(135deg, #5CB9CE 0%, #4facbe 100%);
        color: white;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        box-shadow: 0 10px 15px -3px rgba(92, 185, 206, 0.3);
        display: inline-block;
        width: 100%;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(92, 185, 206, 0.4);
        filter: brightness(1.05);
    }

    .text-muted {
        color: #64748b;
    }
</style>
{% endblock %}

{% block content %}
<div class="bg-light-mesh"></div>

<div class="main-wrapper px-4">
    <div class="error-card mx-auto">
        <div class="error-code">404</div>
        <h1 class="text-2xl font-bold text-slate-900 mb-3">Page Not Found</h1>
        <p class="text-muted mb-8 leading-relaxed">
            The resource you're looking for doesn't exist or is currently restricted.
        </p>
        
        <div class="space-y-4">
            <a href="/" class="btn-primary">
                Return Home
            </a>
            
        </div>
    </div>
</div>
{% endblock %}
